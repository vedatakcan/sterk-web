<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --star-white: rgba(255, 255, 255, 0.9);
        }

        /* TEMEL SIFIRLAMA */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            /* ÖNEMLİ: Body'de renk olmazsa siyah perde oluşmaz */
            background: transparent; 
            overflow-x: hidden;
        }

        /* TÜM UZAY KATMANLARI BURADA */
        .background-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10; /* Her şeyin en arkasında */
            pointer-events: none;
            /* Görseldeki o koyu lacivert/siyah geçişli uzay */
            background: linear-gradient(135deg, #020205 0%, #05050a 50%, #0a1931 100%);
        }

        /* NEBULA PARLAMALARI (İkinci görseldeki renkli efektler) */
        .nebula {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(128, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 128, 255, 0.08) 0%, transparent 50%);
        }

        .stars-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .twinkling-star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* GEZEGENLER */
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: inset -15px -15px 40px rgba(0,0,0,0.9);
        }

        .planet-saturn {
            width: 140px; height: 140px;
            background: radial-gradient(circle at 30% 30%, #d4a373, #3f3225);
            bottom: 10%; left: 5%;
        }

        /* İÇERİK ALANI */
        nav {
            position: relative;
            padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; }
        .logo-name { font-size: 18px; font-weight: 800; letter-spacing: 2px; }

        .hero {
            height: calc(100vh - 85px); /* Navigasyon düşülmüş yükseklik */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-size: clamp(50px, 15vw, 110px);
            font-weight: 900; letter-spacing: 8px;
            margin-bottom: 5px;
            /* Cam efekti başlık */
            background: linear-gradient(to bottom, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title { color: var(--primary-orange); letter-spacing: 5px; font-weight: 700; text-transform: uppercase; font-size: 14px; }
        .tagline { margin-top: 20px; font-size: 16px; color: rgba(255,255,255,0.7); max-width: 400px; line-height: 1.5; }

        footer {
            position: absolute;
            bottom: 20px; width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div class="background-stage">
        <div class="nebula"></div>
        <div id="stars-container" class="stars-overlay"></div>
        <div class="planet planet-saturn"></div>
    </div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
    </nav>

    <main class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası kelime avında zihnini özgür bırak.</p>
    </main>

    <footer>&copy; 2026 STERK. TÜM HAKLARI SAKLIDIR.</footer>

    <script>
        window.onload = function() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'twinkling-star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        };
    </script>
</body>
</html>
