<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --star-white: rgba(255, 255, 255, 0.9);
        }

        /* TÜM SAYFAYI SIFIRLA */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #020205; /* Temel siyah */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ARKA PLAN SABİTLEYİCİ - EN ÖNEMLİ KISIM BURASI */
        .background-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10; /* Her şeyin en arkasında */
            pointer-events: none;
            overflow: hidden;
        }

        .space-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(128, 0, 255, 0.15) 0%, transparent 50%),
                linear-gradient(135deg, #050508 0%, #0a1931 100%);
        }

        .stars-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .twinkling-star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* GEZEGENLERİ BURAYA ALDIK */
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.9);
        }

        .planet-saturn {
            width: 150px; height: 150px;
            background: radial-gradient(circle at 30% 30%, #d4a373, #3f3225);
            bottom: 10%;
            left: -30px; /* Mobilde biraz dışarı çıksın şık durur */
        }

        /* NAVİGASYON */
        nav {
            position: absolute; /* Fixed yerine absolute yaparak çakışmayı önledik */
            top: 0; width: 100%;
            padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; }
        .logo-name { font-size: 18px; font-weight: 800; letter-spacing: 2px; }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px; }

        /* ANA İÇERİK */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 30px;
            background: transparent; /* Arkasını gösterir */
        }

        .main-title {
            font-size: clamp(50px, 15vw, 120px);
            font-weight: 900; letter-spacing: 8px;
            margin-bottom: 5px;
        }

        .sub-title { color: var(--primary-orange); letter-spacing: 5px; font-weight: 700; text-transform: uppercase; font-size: 14px; }
        .tagline { margin-top: 20px; font-size: 16px; color: rgba(255,255,255,0.6); max-width: 400px; line-height: 1.5; }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-stage">
        <div class="space-bg"></div>
        <div id="stars-container" class="stars-overlay"></div>
        <div class="planet planet-saturn"></div>
    </div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
        <div class="nav-links">
            <a href="privacy.html">Gizlilik</a>
            <a href="terms.html">Koşullar</a>
        </div>
    </nav>

    <main class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası kelime avında zihnini özgür bırak.</p>
    </main>

    <footer>© 2026 STERK. TÜM HAKLARI SAKLIDIR.</footer>

    <script>
        // Yıldız oluşturma mantığı aynı ama konteyner içine garantili ekleme yapıyoruz
        function createStars() {
            const container = document.getElementById('stars-container');
            if(!container) return;
            
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'twinkling-star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }
        
        window.onload = createStars;
    </script>
</body>
</html>
