<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>

<style>
:root {
    --primary-orange: #ff5e3a;
    --star-white: rgba(255, 255, 255, 0.9);
    --nav-bg: rgba(0, 0, 0, 0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #ffffff;
    background: transparent;
    overflow-x: hidden;
}

/* BACKGROUND */
.background-stage {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -10;
    pointer-events: none;
    background: linear-gradient(135deg, #020205 0%, #05050a 50%, #0a1931 100%);
}

.nebula {
    position: absolute;
    width: 100%; height: 100%;
}

.stars-overlay { position: absolute; width: 100%; height: 100%; }

.twinkling-star {
    position: absolute;
    background: var(--star-white);
    border-radius: 50%;
    animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
}

.planet {
    position: absolute;
    border-radius: 50%;
    box-shadow: inset -15px -15px 40px rgba(0,0,0,0.9);
}

.planet-saturn {
    width: 140px; height: 140px;
    background: radial-gradient(circle at 30% 30%, #d4a373, #3f3225);
    bottom: 10%; left: 5%;
}

/* NAV */
nav {
    position: fixed;
    top: 0; width: 100%;
    padding: 20px 5%;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(10px);
}

.logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
.logo-img { width: 35px; height: 35px; }
.logo-name { font-size: 18px; font-weight: 800; }

.nav-links { display: flex; gap: 30px; }
.nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; }

/* HAMBURGER */
.hamburger {
    display: none;
    cursor: pointer;
    z-index: 110;
    background: none;
    border: none;
}
.hamburger span {
    display: block;
    width: 25px;
    height: 3px;
    background: white;
    margin: 5px 0;
}

/* OVERLAY */
.menu-overlay {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 104;
}
.menu-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

/* SIDE MENU */
.mobile-menu {
    position: fixed;
    top: 0;
    right: -80%;
    width: 80%;
    height: 100vh;
    background: rgba(2,2,5,0.98);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    transition: 0.4s;
    z-index: 105;
}
.mobile-menu.active {
    right: 0;
}

.mobile-menu a {
    font-size: 24px;
    color: white;
    text-decoration: none;
}

/* CLOSE BUTTON */
.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .nav-links { display: none; }
    .hamburger { display: block; }
}
</style>
</head>

<body>

<div class="background-stage">
    <div id="stars-container" class="stars-overlay"></div>
    <div class="planet planet-saturn"></div>
</div>

<nav>
    <a href="#" class="logo-area">
        <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" class="logo-img">
        <span class="logo-name">STERK</span>
    </a>

    <div class="nav-links">
        <a href="#">Ana Sayfa</a>
        <a href="#">Gizlilik</a>
    </div>

    <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </button>
</nav>

<!-- OVERLAY -->
<div class="menu-overlay" id="overlay"></div>

<!-- MENU -->
<div class="mobile-menu" id="menu">
    <div class="close-btn" id="closeBtn">✕</div>
    <a href="#">Ana Sayfa</a>
    <a href="#">Gizlilik</a>
    <a href="#">Koşullar</a>
</div>

<main class="hero">
    <h1>STERK</h1>
</main>

<script>
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");

function openMenu() {
    menu.classList.add("active");
    overlay.classList.add("active");
}

function closeMenu() {
    menu.classList.remove("active");
    overlay.classList.remove("active");
}

hamburger.onclick = () => {
    menu.classList.contains("active") ? closeMenu() : openMenu();
};

overlay.onclick = closeMenu;
closeBtn.onclick = closeMenu;

document.querySelectorAll(".mobile-menu a").forEach(link => {
    link.onclick = closeMenu;
});
</script>

</body>
</html>
