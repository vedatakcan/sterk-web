<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #020205;
            --nebula-glow: rgba(26, 11, 46, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--deep-space);
            color: #ffffff;
            overflow: hidden;
        }

        /* NEBULA DERİNLİK */
        .nebula-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(255, 94, 58, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 150, 255, 0.05) 0%, transparent 40%),
                radial-gradient(ellipse at bottom, var(--nebula-glow) 0%, transparent 70%);
            z-index: -3;
        }

        /* PARLAYAN VE HAREKETLİ YILDIZLAR */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* GEZEGENLER */
        .planet {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            filter: blur(1px);
            opacity: 0.7;
        }

        .main-planet {
            bottom: -100px;
            left: -100px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle at 70% 30%, #333 0%, #000 80%);
            box-shadow: inset -10px -10px 40px rgba(0,0,0,1), 15px 15px 50px rgba(255, 94, 58, 0.1);
        }

        /* İÇERİK */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-img { width: 38px; height: 38px; border-radius: 10px; box-shadow: 0 0 15px rgba(255, 94, 58, 0.4); }
        .logo-name { font-size: 20px; font-weight: 800; letter-spacing: 2px; }

        .nav-menu a { color: rgba(255,255,255,0.5); text-decoration: none; margin-left: 25px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--primary-orange); }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        .main-title {
            font-size: clamp(50px, 10vw, 85px); /* Daha makul bir boyut */
            font-weight: 900;
            letter-spacing: 15px;
            background: linear-gradient(to bottom, #fff 50%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 14px;
            color: var(--primary-orange);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .tagline {
            margin-top: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            max-width: 500px;
            line-height: 1.6;
            font-weight: 300;
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="nebula-container"></div>
    <div class="star-field" id="starField"></div>
    <div class="planet main-planet"></div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
        <div class="nav-menu">
            <a href="index.html">ANA SAYFA</a>
            <a href="privacy.html">GİZLİLİK</a>
            <a href="terms.html">KOŞULLAR</a>
        </div>
    </nav>

    <div class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">PLANET JOURNEY</div>
        <p class="tagline">Kelimelerin gücüyle galaksiyi keşfet. Yıldızların arasında zihnini özgür bırak.</p>
    </div>

    <footer>
        &copy; 2026 STERK. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // Rastgele parlayan yıldızlar oluşturma
        const starField = document.getElementById('starField');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 2 + 1;
            const duration = Math.random() * 3 + 2;

            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            
            starField.appendChild(star);
        }
    </script>
</body>
</html>
