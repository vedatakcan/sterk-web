<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #000000;
            --accent-red: #2b0a0a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, var(--accent-red) 0%, var(--deep-space) 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* HAREKETLİ YILDIZLAR */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .stars {
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 1744px 122px #FFF , 134px 1321px #FFF , 156px 156px #FFF, 800px 400px #FFF, 200px 900px #FFF, 1400px 600px #FFF;
            animation: spaceFly 100s linear infinite;
        }

        @keyframes spaceFly {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-circle {
            width: 35px; height: 35px;
            background: linear-gradient(135deg, var(--primary-orange), #ff2e00);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; font-size: 20px;
        }

        .logo-name {
            font-size: 22px; font-weight: 800; color: white;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* MASAÜSTÜ MENÜ */
        .nav-menu {
            display: flex; gap: 30px;
        }

        .nav-menu a {
            color: #ccc; text-decoration: none; font-size: 14px;
            transition: 0.3s; font-weight: 500;
        }

        .nav-menu a:hover { color: var(--primary-orange); }

        /* MOBİL HAMBURGER */
        .hamburger {
            display: none; cursor: pointer; flex-direction: column; gap: 5px;
        }

        .hamburger span {
            width: 25px; height: 2px; background: white; border-radius: 2px;
        }

        /* HERO ALANI */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative; z-index: 2;
        }

        .main-title {
            font-size: clamp(48px, 10vw, 84px);
            font-weight: 900; letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: clamp(16px, 4vw, 22px);
            color: var(--primary-orange);
            letter-spacing: 4px; text-transform: uppercase;
            font-weight: 300;
        }

        .tagline {
            margin-top: 30px; font-size: 18px; color: #888;
            max-width: 500px; line-height: 1.6;
        }

        /* FOOTER */
        footer {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; z-index: 10;
        }

        .copyright { color: #444; font-size: 12px; margin-top: 10px; }

        /* RESPONSIVE AYARLAR */
        @media (max-width: 768px) {
            .nav-menu { display: none; } /* Normal menüyü gizle */
            .hamburger { display: flex; } /* Hamburgeri göster */
            
            /* Mobil menü açıldığında (Opsiyonel basitlik için gizli tuttuk) */
            .main-title { letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
    </div>

    <nav>
        <a href="index.html" class="logo-area">
            <div class="logo-circle">S</div>
            <span class="logo-name">Sterk</span>
        </a>
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik</a>
            <a href="terms.html">Koşullar</a>
        </div>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="hero">
        <h1 class="main-title">Sterk</h1>
        <div class="sub-title">Crossword</div>
        <p class="tagline">Gezegenler arası kelime avına hazır mısın? Yıldızların arasında zihnini zorla ve yeni dünyalar keşfet.</p>
    </div>

    <footer>
        <p class="copyright">&copy; 2026 Meji Team. Tüm hakları saklıdır.</p>
    </footer>

    <script>
        function toggleMenu() {
            // İleride mobil menü animasyonu eklemek istersen burayı kullanabilirsin
            alert("Gizlilik ve Koşullar linkleri sayfanın altındadır.");
        }
    </script>

</body>
</html>
