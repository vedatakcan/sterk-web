<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #020205;
            --nebula-glow: rgba(26, 11, 46, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--deep-space);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ARKA PLAN KATMANLARI */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 70% 20%, var(--nebula-glow) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(10, 30, 60, 0.4) 0%, transparent 40%);
            z-index: -2;
        }

        /* HAREKETLİ BÜYÜK GEZEGEN (Görseldeki hissi verir) */
        .giant-planet {
            position: fixed;
            bottom: -150px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 30% 30%, #333, #000 70%);
            border-radius: 50%;
            box-shadow: -20px -20px 50px rgba(255, 94, 58, 0.1), 
                        inset 20px 20px 60px rgba(0,0,0,0.9);
            z-index: -1;
            opacity: 0.6;
            animation: planetFloat 60s ease-in-out infinite;
        }

        @keyframes planetFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, -20px) rotate(5deg); }
        }

        /* YILDIZLAR VE METEORLAR */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            box-shadow: 400px 200px #FFF, 1200px 600px #FFF, 800px 900px #FFF, 200px 400px #FFF, 1500px 100px #FFF;
            z-index: -1;
            opacity: 0.4;
        }

        .shooting-star {
            position: fixed;
            top: 0; left: 50%;
            width: 2px; height: 100px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), #fff);
            opacity: 0;
            z-index: -1;
            animation: shoot 8s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(-100px) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translateX(-500px) translateY(500px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { width: 40px; height: 40px; border-radius: 10px; box-shadow: 0 0 15px var(--primary-orange); }
        .logo-name { font-size: 24px; font-weight: 900; color: white; letter-spacing: 2px; }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--primary-orange); }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 900; letter-spacing: 20px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            drop-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
        }

        .sub-title {
            font-size: 18px; color: var(--primary-orange);
            letter-spacing: 10px; text-transform: uppercase; margin-top: 10px;
        }

        .tagline {
            margin-top: 50px; font-size: 18px; color: #aaa;
            max-width: 600px; line-height: 1.8; font-weight: 300;
        }

        /* MOBİL */
        .hamburger { display: none; cursor: pointer; z-index: 1001; }
        .hamburger div { width: 25px; height: 2px; background: white; margin: 6px; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: block; }
            .giant-planet { width: 300px; height: 300px; bottom: -50px; right: -50px; }
        }

        footer { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.2); font-size: 11px; }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div class="stars"></div>
    <div class="giant-planet"></div>
    <div class="shooting-star"></div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Koşulları</a>
        </div>
        <div class="hamburger" onclick="alert('Menü yakında aktif!')">
            <div></div><div></div><div></div>
        </div>
    </nav>

    <div class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası bir kelime avına hazır mısın? Derin uzayın sessizliğinde zihnini zorla ve yeni dünyaların kapısını arala.</p>
    </div>

    <footer>
        &copy; 2026 STERK. TÜM HAKLARI SAKLIDIR.
    </footer>

</body>
</html>
