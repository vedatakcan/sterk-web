<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --star-white: rgba(255, 255, 255, 0.9);
            --nav-bg: rgba(0, 0, 0, 0.2); /* Daha şeffaf yaptık */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            background-color: #020205; /* Temel renk */
            overflow-x: hidden;
        }

        /* ARKA PLAN - BURASI DÜZELTİLDİ */
        .background-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Arka planı görünür seviyeye aldık */
            pointer-events: none;
            /* Gradyan daha canlı hale getirildi */
            background: linear-gradient(135deg, #020205 0%, #05050a 40%, #0a1931 100%);
        }

        .stars-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        
        .twinkling-star {
            position: absolute; background: var(--star-white); border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .planet-saturn {
            position: absolute; 
            width: 180px; height: 180px; 
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #d4a373, #3f3225);
            bottom: 15%; 
            right: 10%; /* Konumu daha dengeli yapıldı */
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(212, 163, 115, 0.2);
            z-index: 3;
        }

        /* NAVİGASYON */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; 
            background: var(--nav-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; }
        .logo-name { font-size: 18px; font-weight: 800; letter-spacing: 2px; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: rgba(255,255,255,0.8); font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary-orange); }

        /* HERO ALANI - İÇERİK ÖNE ÇIKARILDI */
        .hero {
            position: relative;
            height: 100vh; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            text-align: center;
            z-index: 10; /* Yazılar yıldızların üstünde olmalı */
        }

        .main-title {
            font-size: clamp(60px, 18vw, 120px); font-weight: 900; letter-spacing: 10px;
            background: linear-gradient(to bottom, #ffffff 30%, #a1a1a1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .sub-title { color: var(--primary-orange); letter-spacing: 6px; font-weight: 700; font-size: 16px; text-transform: uppercase; margin-top: -10px; }
        .tagline { margin-top: 25px; font-size: 18px; color: rgba(255,255,255,0.8); max-width: 500px; padding: 0 20px; line-height: 1.6; }

        footer { position: absolute; bottom: 25px; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.4); z-index: 10; letter-spacing: 1px; }

        /* MOBİL AYARLAR */
        .hamburger { display: none; cursor: pointer; background: none; border: none; z-index: 1100; padding: 10px; }
        .hamburger span { display: block; width: 28px; height: 3px; background: white; margin: 5px 0; transition: 0.4s; border-radius: 2px; }

        .mobile-menu {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100vh;
            background: rgba(2, 2, 5, 0.98); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 35px; transition: 0.5s; z-index: 1050;
        }
        .mobile-menu.active { right: 0; }
        .mobile-menu a { font-size: 24px; color: white; text-decoration: none; font-weight: 600; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
            .planet-saturn { width: 120px; height: 120px; bottom: 10%; right: 5%; }
        }
    </style>
</head>
<body>

    <div class="background-stage">
        <div id="stars-container" class="stars-overlay"></div>
        <div class="planet-saturn"></div>
    </div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Koşulları</a>
        </div>

        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Ana Sayfa</a>
        <a href="privacy.html">Gizlilik Politikası</a>
        <a href="terms.html">Kullanım Koşulları</a>
    </div>

    <main class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası kelime avında zihnini özgür bırak.</p>
    </main>

    <footer>&copy; 2026 STERK. TÜM HAKLARI SAKLIDIR.</footer>

    <script>
        // Hamburger Menü Kontrolü
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            mobileMenu.classList.toggle('active');
        });

        // Yıldız Oluşturma Fonksiyonu
        window.onload = function() {
            const container = document.getElementById('stars-container');
            const starCount = 150; // Yıldız sayısını artırdık
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'twinkling-star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        };
    </script>
</body>
</html>
