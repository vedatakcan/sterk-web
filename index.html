<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #000000;
            --accent-red: #2b0a0a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, var(--accent-red) 0%, var(--deep-space) 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* HAREKETLİ YILDIZLAR */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .stars {
            width: 2px; height: 2px;
            background: transparent;
            box-shadow: 1744px 122px #FFF, 134px 1321px #FFF, 156px 156px #FFF, 800px 400px #FFF, 200px 900px #FFF, 1400px 600px #FFF, 500px 200px #FFF;
            animation: spaceFly 120s linear infinite;
        }

        @keyframes spaceFly {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            z-index: 1001;
        }

        .logo-circle {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary-orange), #ff2e00);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; font-size: 22px;
            box-shadow: 0 0 15px rgba(255, 94, 58, 0.4);
        }

        .logo-name {
            font-size: 24px; font-weight: 800; color: white;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* MASAÜSTÜ MENÜ */
        .nav-menu {
            display: flex; gap: 35px;
        }

        .nav-menu a {
            color: #eee; text-decoration: none; font-size: 15px;
            transition: 0.3s; font-weight: 500;
        }

        .nav-menu a:hover { color: var(--primary-orange); }

        /* MOBİL MENÜ OVERLAY */
        .mobile-overlay {
            position: fixed;
            top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 30px;
            transition: 0.4s ease-in-out;
            z-index: 999;
        }

        .mobile-overlay.active {
            right: 0;
        }

        .mobile-overlay a {
            color: white; text-decoration: none; font-size: 24px; font-weight: 600;
        }

        /* HAMBURGER BUTON */
        .hamburger {
            display: none; cursor: pointer; z-index: 1001;
            padding: 10px;
        }

        .hamburger div {
            width: 28px; height: 3px; background: white; margin: 5px;
            transition: 0.4s; border-radius: 2px;
        }

        /* HAMBURGER ANİMASYON */
        .toggle .line1 { transform: rotate(-45deg) translate(-5px, 6px); }
        .toggle .line2 { opacity: 0; }
        .toggle .line3 { transform: rotate(45deg) translate(-5px, -6px); }

        /* HERO ALANI */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative; z-index: 2;
        }

        .main-title {
            font-size: clamp(54px, 12vw, 90px);
            font-weight: 900; letter-spacing: 10px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 94, 58, 0.3);
        }

        .sub-title {
            font-size: clamp(18px, 5vw, 24px);
            color: var(--primary-orange);
            letter-spacing: 5px; text-transform: uppercase;
            margin-top: 10px;
        }

        .tagline {
            margin-top: 40px; font-size: 18px; color: #999;
            max-width: 550px; line-height: 1.7;
        }

        footer {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; z-index: 10;
        }

        .copyright { color: #444; font-size: 12px; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
    </div>

    <nav>
        <a href="index.html" class="logo-area">
            <div class="logo-circle">S</div>
            <span class="logo-name">Sterk</span>
        </a>
        
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Koşulları</a>
        </div>

        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <div class="mobile-overlay" id="mobileOverlay">
        <a href="index.html" onclick="toggleMenu()">Ana Sayfa</a>
        <a href="privacy.html" onclick="toggleMenu()">Gizlilik Politikası</a>
        <a href="terms.html" onclick="toggleMenu()">Kullanım Koşulları</a>
    </div>

    <div class="hero">
        <h1 class="main-title">Sterk</h1>
        <div class="sub-title">Crossword</div>
        <p class="tagline">Gezegenler arası kelime avına hazır mısın? Yıldızların arasında zihnini zorla ve yeni dünyalar keşfet.</p>
    </div>

    <footer>
        <p class="copyright">&copy; 2026 Meji Team. Tüm hakları saklıdır.</p>
    </footer>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('mobileOverlay');
            const hamburger = document.getElementById('hamburger');
            
            overlay.classList.toggle('active');
            hamburger.classList.toggle('toggle');
        }
    </script>

</body>
</html>
