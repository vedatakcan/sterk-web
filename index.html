<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --space-black: #050508;
            /* Referans görselindeki mor tonu */
            --referans-purple: #1a0b2e; 
            --star-white: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--space-black);
            color: #ffffff;
            overflow: hidden;
        }

        /* UZAY ARKA PLANI (REFERANS RENKLERİ) */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Merkezden dışa doğru bir gradyan ile referans görseldeki renk geçişini sağla */
            background: radial-gradient(circle at center, var(--referans-purple) 0%, var(--space-black) 100%);
            z-index: -3;
        }

        /* GERÇEKÇİ CSS YILDIZLARI */
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        /* Küçük, parlak yıldızlar için bir sınıf */
        .twinkling-star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            opacity: 0.8;
            /* Hafif bir dış ışıma (glow) */
            box-shadow: 0 0 4px var(--star-white);
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* GEZEGEN */
        .planet-decor {
            position: fixed;
            bottom: -100px;
            right: -50px;
            width: 400px;
            height: 400px;
            /* Kendi başına dönen, gölgeli bir gezegen */
            background: radial-gradient(circle at 30% 30%, #444, #000);
            border-radius: 50%;
            box-shadow: -20px -20px 50px rgba(26, 11, 46, 0.5), inset 10px 10px 50px rgba(255,255,255,0.1);
            z-index: -1;
            opacity: 0.6;
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-img { width: 40px; height: 40px; border-radius: 10px; box-shadow: 0 0 15px var(--primary-orange); }
        .logo-name { font-size: 22px; font-weight: 900; letter-spacing: 2px; }

        .nav-menu { display: flex; gap: 25px; }
        .nav-menu a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--primary-orange); }

        /* MOBİL MENÜ */
        .hamburger { display: none; flex-direction: column; gap: 6px; cursor: pointer; }
        .hamburger span { width: 28px; height: 3px; background: white; border-radius: 2px; }

        .mobile-overlay {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.98);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 40px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
        }
        .mobile-overlay.active { right: 0; }
        .mobile-overlay a { color: white; text-decoration: none; font-size: 24px; font-weight: 600; }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-size: clamp(60px, 18vw, 120px);
            font-weight: 900; letter-spacing: 15px;
            background: linear-gradient(to bottom, #ffffff 30%, #555555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .sub-title {
            font-size: 16px; color: var(--primary-orange);
            letter-spacing: 8px; text-transform: uppercase;
            margin-top: -10px; font-weight: 700;
        }

        .tagline {
            margin-top: 40px; font-size: 18px; color: rgba(255,255,255,0.7);
            max-width: 600px; line-height: 1.8;
        }

        footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: flex; }
            .main-title { letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div id="stars-container" class="stars-overlay"></div>
    <div class="planet-decor"></div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
        
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Koşulları</a>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-overlay" id="mobileMenu">
        <a href="index.html" onclick="toggleMenu()">Ana Sayfa</a>
        <a href="privacy.html" onclick="toggleMenu()">Gizlilik Politikası</a>
        <a href="terms.html" onclick="toggleMenu()">Kullanım Koşulları</a>
    </div>

    <div class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası kelime avında zihnini özgür bırak.</p>
    </div>

    <footer>&copy; 2026 STERK. TÜM HAKLARI SAKLIDIR.</footer>

    <script>
        // Hamburger Menü Fonksiyonu
        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }

        // Referans Görseline Uygun Yıldızları Dinamik Oluşturma
        const container = document.getElementById('stars-container');
        // Görseldeki gibi seyrek ve net yıldızlar için sayıyı azalttık
        const starCount = 100; 

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'twinkling-star';
            
            // Rastgele boyut (referans görselindeki gibi farklı boyutlar)
            const size = Math.random() * 3 + 0.5; // 0.5px ile 3.5px arası
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            // Rastgele pozisyon
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            
            // Rastgele parlama hızı ve gecikmesi
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 5}s`;

            container.appendChild(star);
        }
    </script>
</body>
</html>
