<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sterk: Crossword</title>

<style>
:root {
    --primary-orange: #ff5e3a;
    --deep-space: #020205;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, sans-serif;
    background: radial-gradient(ellipse at bottom, #0a0a1a 0%, #000 100%);
    color:white;
    overflow-x:hidden;
}

/* 🌌 YILDIZ KATMANLARI (PARALLAX) */
.stars, .stars2, .stars3 {
    position: fixed;
    width: 200%;
    height: 200%;
    background-repeat: repeat;
    z-index:-1;
}

.stars { background-image: radial-gradient(2px 2px white, transparent); animation: moveStars 200s linear infinite; }
.stars2 { background-image: radial-gradient(1px 1px #aaa, transparent); animation: moveStars 300s linear infinite; opacity:0.5; }
.stars3 { background-image: radial-gradient(1.5px 1.5px #fff, transparent); animation: moveStars 150s linear infinite; opacity:0.3; }

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-50%, -50%); }
}

/* NAV */
nav {
    position: fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 5%;
    z-index:1000;
}

/* LOGO */
.logo-area {
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;
}

.logo-img { width:35px; }

/* MENU */
.nav-menu {
    display:flex;
    gap:25px;
}

.nav-menu a {
    text-decoration:none;
    color:rgba(255,255,255,0.6);
    font-size:12px;
}

.nav-menu a:hover {
    color:var(--primary-orange);
}

/* 🍔 HAMBURGER */
.hamburger {
    display:none;
    flex-direction:column;
    cursor:pointer;
}

.hamburger span {
    width:25px;
    height:3px;
    background:white;
    margin:4px 0;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.main-title {
    font-size: clamp(50px, 10vw, 80px);
    letter-spacing:12px;
    font-weight:900;
}

.sub-title {
    color:var(--primary-orange);
    letter-spacing:6px;
    margin-top:10px;
}

.tagline {
    margin-top:30px;
    opacity:0.6;
    max-width:400px;
}

/* 📱 MOBİL */
@media(max-width:768px){

    .nav-menu {
        position:absolute;
        top:70px;
        right:0;
        background:#000;
        flex-direction:column;
        width:200px;
        padding:20px;
        display:none;
    }

    .nav-menu.active {
        display:flex;
    }

    .hamburger {
        display:flex;
    }
}

</style>
</head>

<body>

<!-- 🌌 YILDIZLAR -->
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<nav>
    <a href="#" class="logo-area">
        <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" class="logo-img">
        <span>STERK</span>
    </a>

    <div class="nav-menu" id="menu">
        <a href="#">ANA SAYFA</a>
        <a href="privacy.html">GİZLİLİK</a>
        <a href="terms.html">KOŞULLAR</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<div class="hero">
    <h1 class="main-title">STERK</h1>
    <div class="sub-title">SPACE WORD GAME</div>
    <p class="tagline">
        Discover words across the galaxy. Challenge your mind beyond the stars.
    </p>
</div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
