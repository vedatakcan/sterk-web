<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --space-black: #050508;
            --referans-purple: #1e0d36; 
            --star-white: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--space-black); /* Yedek renk */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ARKA PLAN KATMANI */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, var(--referans-purple) 0%, transparent 70%),
                var(--space-black);
            z-index: -3;
        }

        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .twinkling-star {
            position: absolute;
            background: var(--star-white);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--star-white);
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* GEZEGEN */
        .planet-decor {
            position: fixed;
            bottom: -120px;
            right: -80px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle at 30% 30%, #444, #000);
            border-radius: 50%;
            box-shadow: -30px -30px 80px rgba(90, 0, 150, 0.3), inset 10px 10px 60px rgba(255,255,255,0.05);
            z-index: -1;
            opacity: 0.7;
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-img { width: 38px; height: 38px; border-radius: 10px; box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); }
        .logo-name { font-size: 20px; font-weight: 900; letter-spacing: 2px; }

        /* MASAÜSTÜ MENÜ */
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: rgba(255,255,255,0.7); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500; 
            transition: 0.3s; 
        }
        .nav-links a:hover { color: var(--primary-orange); }

        /* HAMBURGER BUTONU */
        .hamburger {
            display: none;
            cursor: pointer;
            z-index: 1100;
            flex-direction: column;
            gap: 6px;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: #fff;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* MOBİL OVERLAY MENÜ */
        .mobile-menu {
            position: fixed;
            top: 0; right: -100%;
            width: 80%; height: 100%;
            background: rgba(10, 6, 18, 0.95);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 35px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1050;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .mobile-menu.active { right: 0; }
        .mobile-menu a {
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-size: clamp(60px, 18vw, 130px);
            font-weight: 900; letter-spacing: 12px;
            background: linear-gradient(to bottom, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
        }

        .sub-title {
            font-size: 15px; color: var(--primary-orange);
            letter-spacing: 7px; text-transform: uppercase;
            margin-top: -5px; font-weight: 700;
        }

        .tagline {
            margin-top: 35px; font-size: 18px; color: rgba(255,255,255,0.6);
            max-width: 550px; line-height: 1.7; font-weight: 300;
        }

        footer { position: absolute; bottom: 25px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.3); }

        /* MOBİL AYARLAR */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .main-title { letter-spacing: 6px; }
            .planet-decor { width: 300px; height: 300px; bottom: -60px; right: -40px; }
        }

        /* Hamburger Animasyonu (Aktifken X olması için) */
        .hamburger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div id="stars-container" class="stars-overlay"></div>
    <div class="planet-decor"></div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Koşulları</a>
        </div>

        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" onclick="toggleMenu()">Ana Sayfa</a>
        <a href="privacy.html" onclick="toggleMenu()">Gizlilik Politikası</a>
        <a href="terms.html" onclick="toggleMenu()">Kullanım Koşulları</a>
    </div>

    <div class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası kelime avında zihnini özgür bırak.</p>
    </div>

    <footer>&copy; 2026 STERK. TÜM HAKLARI SAKLIDIR.</footer>

    <script>
        // Hamburger ve Mobil Menü Kontrolü
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            const hamburger = document.getElementById('hamburger');
            menu.classList.toggle('active');
            hamburger.classList.toggle('active');
        }

        // Yıldız Oluşturma
        const container = document.getElementById('stars-container');
        const starCount = 130;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'twinkling-star';
            const size = Math.random() * 2.5 + 0.5;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            container.appendChild(star);
        }
    </script>
</body>
</html>
