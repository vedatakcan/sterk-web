<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #020205;
            --nebula-glow: rgba(26, 11, 46, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--deep-space);
            color: #ffffff;
            overflow: hidden;
        }

        /* 1. KATMAN: NEBULA VE RENK GEÇİŞLERİ */
        .nebula-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(255, 94, 58, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 150, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at bottom, var(--nebula-glow) 0%, transparent 70%);
            z-index: -3;
        }

        /* 2. KATMAN: DİNAMİK YILDIZLAR */
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'); /* İnce yıldız dokusu */
            opacity: 0.3;
            z-index: -2;
        }

        /* 3. KATMAN: PARLAYAN GEZEGENLER (Görseldeki gibi) */
        .planet {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            filter: blur(1px);
        }

        .main-planet {
            bottom: -100px;
            left: -100px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle at 70% 30%, #444 0%, #000 80%);
            box-shadow: inset -20px -20px 50px rgba(0,0,0,1), 20px 20px 60px rgba(255, 94, 58, 0.15);
            animation: slowRotate 120s linear infinite;
        }

        .small-planet {
            top: 15%;
            right: 10%;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
            opacity: 0.6;
        }

        /* 4. KATMAN: KOZMİK TOZ VE HAREKET */
        .shooting-star {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: rotate(-45deg);
            opacity: 0;
            animation: meteor 10s ease-in infinite;
        }

        @keyframes meteor {
            0% { transform: translate(100vw, 0) rotate(-45deg); opacity: 0; }
            5% { opacity: 1; }
            15% { transform: translate(-100px, 100vh) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* İÇERİK TASARIMI */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; text-decoration: none; color: white; }
        .logo-img { width: 45px; height: 45px; border-radius: 12px; box-shadow: 0 0 20px rgba(255, 94, 58, 0.6); }
        .logo-name { font-size: 26px; font-weight: 900; letter-spacing: 3px; }

        .nav-menu a { color: rgba(255,255,255,0.6); text-decoration: none; margin-left: 30px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--primary-orange); text-shadow: 0 0 10px var(--primary-orange); }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            position: relative;
        }

        .main-title {
            font-size: clamp(80px, 18vw, 160px);
            font-weight: 900;
            letter-spacing: 25px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 20px;
            color: var(--primary-orange);
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 400;
            animation: pulse 4s ease-in-out infinite;
        }

        .tagline {
            margin-top: 60px;
            font-size: clamp(14px, 2vw, 18px);
            color: rgba(255,255,255,0.5);
            max-width: 550px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; letter-spacing: 12px; }
            50% { opacity: 1; letter-spacing: 14px; }
        }

        footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }

        /* MOBİL DÜZENLEMELER */
        @media (max-width: 768px) {
            .main-title { letter-spacing: 10px; }
            .nav-menu { display: none; }
            .main-planet { width: 250px; height: 250px; bottom: -50px; left: -50px; }
        }
    </style>
</head>
<body>

    <div class="nebula-container"></div>
    <div class="stars-overlay"></div>
    <div class="planet main-planet"></div>
    <div class="planet small-planet"></div>
    <div class="shooting-star"></div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
        <div class="nav-menu">
            <a href="index.html">ANA SAYFA</a>
            <a href="privacy.html">GİZLİLİK</a>
            <a href="terms.html">KOŞULLAR</a>
        </div>
    </nav>

    <div class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">PLANET JOURNEY</div>
        <p class="tagline">Kelimelerin gücüyle galaksiyi keşfet. Yıldızların arasında zihnini özgür bırak ve gizli dünyaları açığa çıkar.</p>
    </div>

    <footer>
        &copy; 2026 MEJI TEAM. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
