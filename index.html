<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #050508; /* Tam siyah yerine çok koyu lacivert-siyah */
            --nebula-purple: #1a0b2e; /* Kırmızı yerine hafif nebula moru */
            --star-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Arka planı daha gerçekçi bir uzay gradyanı yaptık */
            background: radial-gradient(circle at top right, var(--nebula-purple) 0%, var(--deep-space) 70%);
            color: #ffffff;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* DİNAMİK YILDIZ SİSTEMİ */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Küçük Yıldızlar */
        .stars {
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 454px 122px #FFF, 134px 1321px #FFF, 156px 156px #FFF, 800px 400px #FFF, 200px 900px #FFF, 1400px 600px #FFF, 500px 200px #FFF, 1000px 100px #FFF, 300px 300px #FFF, 1200px 800px #FFF;
            animation: spaceFly 150s linear infinite;
        }

        /* Daha Parlak ve Yavaş Kayması İçin 2. Katman */
        .stars2 {
            width: 2px; height: 2px;
            background: transparent;
            box-shadow: 200px 10px #FFF, 600px 500px #FFF, 1000px 900px #FFF, 1500px 200px #FFF, 400px 800px #FFF;
            animation: spaceFly 100s linear infinite;
            opacity: 0.5;
        }

        @keyframes spaceFly {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4); /* Daha şeffaf ve cam efekti */
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            z-index: 1001;
        }

        .logo-img {
            width: 40px; height: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 94, 58, 0.5);
        }

        .logo-name {
            font-size: 22px; font-weight: 800; color: white;
            letter-spacing: 2px; text-transform: uppercase;
        }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a {
            color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px;
            transition: 0.3s; font-weight: 500;
        }
        .nav-menu a:hover { color: var(--primary-orange); }

        /* HERO ALANI - UZAY HİSSİ */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative; z-index: 2;
        }

        .main-title {
            font-size: clamp(60px, 15vw, 110px);
            font-weight: 900; letter-spacing: 15px;
            text-transform: uppercase;
            /* Yazıya derinlik katmak için parıltılı efekt */
            background: linear-gradient(to bottom, #ffffff 30%, var(--primary-orange) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 94, 58, 0.4));
        }

        .sub-title {
            font-size: clamp(16px, 4vw, 22px);
            color: var(--primary-orange);
            letter-spacing: 8px; text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.9;
        }

        .tagline {
            margin-top: 45px; font-size: 18px; color: rgba(255,255,255,0.6);
            max-width: 500px; line-height: 1.8;
            font-weight: 300;
        }

        /* MOBİL OVERLAY */
        .mobile-overlay {
            position: fixed;
            top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--deep-space);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 30px;
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            z-index: 999;
        }
        .mobile-overlay.active { right: 0; }
        .mobile-overlay a { color: white; text-decoration: none; font-size: 26px; font-weight: 600; letter-spacing: 2px; }

        .hamburger { display: none; cursor: pointer; z-index: 1001; padding: 10px; }
        .hamburger div { width: 25px; height: 2px; background: white; margin: 6px; transition: 0.4s; }

        .toggle .line1 { transform: rotate(-45deg) translate(-5px, 6px); }
        .toggle .line2 { opacity: 0; }
        .toggle .line3 { transform: rotate(45deg) translate(-5px, -6px); }

        footer { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 10; }
        .copyright { color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
        <div class="stars2"></div>
    </div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">Sterk</span>
        </a>
        
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Koşulları</a>
        </div>

        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <div class="mobile-overlay" id="mobileOverlay">
        <a href="index.html" onclick="toggleMenu()">Ana Sayfa</a>
        <a href="privacy.html" onclick="toggleMenu()">Gizlilik Politikası</a>
        <a href="terms.html" onclick="toggleMenu()">Kullanım Koşulları</a>
    </div>

    <div class="hero">
        <h1 class="main-title">Sterk</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası gizli kelimeleri keşfetmeye hazır mısın? Derin uzayda zihnini özgür bırak.</p>
    </div>

    <footer>
        <p class="copyright">&copy; 2026 MEJI TEAM. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('mobileOverlay');
            const hamburger = document.getElementById('hamburger');
            overlay.classList.toggle('active');
            hamburger.classList.toggle('toggle');
        }
    </script>
</body>
</html>
