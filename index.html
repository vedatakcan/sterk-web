<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterk: Crossword - Gezegenler Arası Yolculuk</title>
    
    <style>
        :root {
            --primary-orange: #ff5e3a;
            --deep-space: #020205;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--deep-space);
            color: #ffffff;
            /* Kaydırmayı tamamen engelliyoruz ki o siyah boşluk çıkmasın */
            overflow: hidden; 
        }

        /* ARKA PLAN VE YILDIZLAR */
        .stars-container {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            z-index: -2;
            /* Nebula efekti tüm ekranı kaplasın */
            background: radial-gradient(ellipse at bottom, #1a0b2e 0%, var(--deep-space) 100%);
        }

        /* Yıldızları ekrana yaymak için absolute ve genişlik veriyoruz */
        .stars, .stars-large {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
        }

        .stars {
            width: 1px; height: 1px;
            /* Daha fazla ve yaygın yıldız gölgesi */
            box-shadow: 10vw 20vh #FFF, 25vw 50vh #FFF, 40vw 10vh #FFF, 60vw 80vh #FFF, 80vw 30vh #FFF, 95vw 60vh #FFF, 15vw 85vh #FFF, 50vw 40vh #FFF, 75vw 15vh #FFF, 30vw 70vh #FFF, 85vw 90vh #FFF, 5vw 45vh #FFF;
            animation: twinkle 4s infinite ease-in-out;
        }

        .stars-large {
            width: 2px; height: 2px;
            box-shadow: 20vw 30vh #FFF, 70vw 60vh #FFF, 50vw 10vh #FFF, 10vw 90vh #FFF, 90vw 20vh #FFF;
            animation: twinkle 6s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* GEZEGEN - Pozisyonu düzeltildi */
        .planet {
            position: fixed;
            bottom: -50px;
            left: -50px;
            width: clamp(200px, 40vw, 350px);
            height: clamp(200px, 40vw, 350px);
            background: radial-gradient(circle at 70% 30%, #333 0%, #000 80%);
            border-radius: 50%;
            box-shadow: inset -10px -10px 40px rgba(0,0,0,1), 10px 10px 30px rgba(255, 94, 58, 0.15);
            z-index: -1;
            opacity: 0.8;
        }

        /* NAVİGASYON */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; }
        .logo-name { font-size: 20px; font-weight: 800; letter-spacing: 1px; }

        .nav-menu { display: flex; gap: 20px; }
        .nav-menu a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; font-weight: 500; }

        /* MOBİL HAMBURGER */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 25px; height: 2px; background: white; }

        .mobile-menu {
            position: fixed;
            top: 0; right: -100%;
            width: 80%; height: 100%;
            background: #05050a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 30px;
            transition: 0.4s;
            z-index: 999;
        }
        .mobile-menu.active { right: 0; }
        .mobile-menu a { color: white; text-decoration: none; font-size: 1.5rem; }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
        }

        .main-title {
            font-size: clamp(60px, 15vw, 100px);
            font-weight: 900; letter-spacing: 10px;
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 14px; color: var(--primary-orange);
            letter-spacing: 5px; text-transform: uppercase;
            margin-top: -10px;
        }

        .tagline {
            margin-top: 30px; font-size: 1.1rem; color: rgba(255,255,255,0.6);
            max-width: 500px; line-height: 1.5;
        }

        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
        <div class="stars-large"></div>
    </div>
    
    <div class="planet"></div>

    <nav>
        <a href="index.html" class="logo-area">
            <img src="https://raw.githubusercontent.com/vedatakcan/sterk-web/main/logo.png" alt="Sterk Logo" class="logo-img">
            <span class="logo-name">STERK</span>
        </a>
        
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="privacy.html">Gizlilik</a>
            <a href="terms.html">Koşullar</a>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" onclick="toggleMenu()">Ana Sayfa</a>
        <a href="privacy.html" onclick="toggleMenu()">Gizlilik Politikası</a>
        <a href="terms.html" onclick="toggleMenu()">Kullanım Koşulları</a>
    </div>

    <div class="hero">
        <h1 class="main-title">STERK</h1>
        <div class="sub-title">Planet Journey</div>
        <p class="tagline">Gezegenler arası kelime avında zihnini özgür bırak.</p>
    </div>

    <footer>&copy; 2026 STERK. Tüm Hakları Saklıdır.</footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
        }
    </script>
</body>
</html>
